<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boxing Punch Labeler</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Top bar: video loader + config -->
    <div id="top-bar">
      <div id="video-loader">
        <label for="drive-url">Google Drive Video URL:</label>
        <input type="text" id="drive-url" placeholder="Paste Google Drive share link here">
        <button onclick="loadDriveVideo()">Load</button>
        <span id="video-name">No video loaded</span>
        <span class="separator">|</span>
        <label for="video-file" class="file-label">or pick local file</label>
        <input type="file" id="video-file" accept="video/*">
      </div>
      <div id="sheet-config">
        <label for="script-url">Apps Script URL:</label>
        <input type="text" id="script-url" placeholder="Google Apps Script Web App URL">
        <button onclick="saveConfig()">Save</button>
        <span id="connection-status">Not configured</span>
      </div>
    </div>

    <!-- Main layout -->
    <div id="main-layout">
      <!-- Left sidebar: punch types -->
      <div id="punch-panel">
        <h3>Punch Type</h3>
        <div id="punch-buttons"></div>
      </div>

      <!-- Center: video player -->
      <div id="video-container">
        <video id="video-player" preload="auto" crossorigin="anonymous"></video>
        <div id="video-controls">
          <button id="btn-play" onclick="togglePlay()">Play</button>
          <button onclick="stepFrames(-2)" title="Back 2 frames">&laquo;</button>
          <button onclick="stepFrames(-1)" title="Back 1 frame">&lsaquo;</button>
          <button onclick="stepFrames(1)" title="Forward 1 frame">&rsaquo;</button>
          <button onclick="stepFrames(2)" title="Forward 2 frames">&raquo;</button>
          <span id="time-display">0.000s / 0.000s</span>
          <input type="range" id="seek-bar" min="0" max="1000" value="0">
          <div id="speed-controls">
            <label>Speed:</label>
            <button onclick="setSpeed(0.25)">0.25x</button>
            <button onclick="setSpeed(0.5)">0.5x</button>
            <button onclick="setSpeed(1)" class="speed-active">1x</button>
            <button onclick="setSpeed(2)">2x</button>
          </div>
        </div>
      </div>

      <!-- Right sidebar: labeling workflow + log -->
      <div id="label-panel">
        <h3>Label Punch</h3>
        <div id="selected-punch">Select a punch type first</div>
        <button id="btn-timestamp" onclick="captureTimestamp()" disabled>
          Select a punch type first
        </button>
        <div id="pending-label"></div>

        <h3>Labels <span id="label-count">(0)</span></h3>
        <div id="label-log"></div>
      </div>
    </div>

    <!-- Keyboard shortcuts help -->
    <div id="shortcuts-bar">
      <strong>Shortcuts:</strong>
      Space = Play/Pause &nbsp;|&nbsp;
      &larr;/&rarr; = &plusmn;1 frame &nbsp;|&nbsp;
      Shift+&larr;/&rarr; = &plusmn;2 frames &nbsp;|&nbsp;
      1-9,0 = Select punch &nbsp;|&nbsp;
      Enter = Capture time &nbsp;|&nbsp;
      Z = Undo last label
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
